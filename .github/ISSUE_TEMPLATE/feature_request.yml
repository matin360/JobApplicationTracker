name: ✨ Feature request
description: Suggest an improvement or a new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should the tracker be able to do?
      placeholder: Let me attach a resume version to each application.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits, and when?
      placeholder: I tailor my resume per application and can't remember which version I sent where.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested solution (optional)
      description: If you have an idea of how it could work — UI, API, data model — sketch it here. Check ROADMAP.md first; it may already be planned.
    validations:
      required: false
